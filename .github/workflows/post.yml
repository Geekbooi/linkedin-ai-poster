name: LinkedIn AI Post

on:
  schedule:
    # Every other day at 8:00 AM UTC (adjust to your timezone)
    - cron: "0 8 */2 * *"

  # Lets you trigger manually from GitHub Actions tab
  workflow_dispatch:

jobs:
  generate-and-post:
    name: Generate → Approve → Post
    runs-on: ubuntu-latest
    timeout-minutes: 90  # Waits up to 90 min for your Telegram reply

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN:     ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:       ${{ secrets.TELEGRAM_CHAT_ID }}
          LINKEDIN_ACCESS_TOKEN:  ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN:    ${{ secrets.LINKEDIN_PERSON_URN }}
        run: python src/main.py
